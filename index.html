<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RohanXLab | Cyber Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            background: #020617;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .galaxy-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
        }

        .planet {
            position: absolute;
            top: 15%;
            right: 10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #60a5fa, #1e3a8a);
            box-shadow: inset -40px -40px 100px rgba(0,0,0,0.8), 0 0 60px rgba(96, 165, 250, 0.4);
            animation: float 10s infinite ease-in-out;
            z-index: -5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: rgba(6, 182, 212, 0.6);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
            transform: translateY(-10px);
        }

        .shimmer-text {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(90deg, #22d3ee, #ffffff, #22d3ee);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes shimmer {
            from { background-position: 0%; }
            to { background-position: 200%; }
        }
    </style>
</head>
<body class="antialiased">
    <div class="galaxy-bg" id="starfield">
        <div class="planet"></div>
    </div>

    <header class="p-8 text-center relative z-10">
        <div class="absolute top-4 left-4 bg-slate-900/50 p-2 rounded-xl border border-cyan-500/30 text-cyan-400 text-xs font-mono">
            Visitors: <span id="visitor-count">0</span>
        </div>
        <h1 class="text-6xl md:text-7xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 via-purple-500 to-cyan-400 tracking-tighter">
            RohanXLab
        </h1>
        <p class="text-cyan-400 mt-2 text-lg uppercase tracking-[0.2em] opacity-80">Curated by RohanX</p>
        
        <div class="mt-8">
            <button onclick="openAdminModal()" 
               class="bg-slate-900 px-8 py-3 rounded-full font-bold border border-cyan-500/30 hover:border-cyan-400 transition-all flex items-center gap-2 mx-auto cursor-pointer">
               🔐 Admin Dashboard
            </button>
        </div>
    </header>

    <div id="admin-modal" class="fixed inset-0 hidden flex items-center justify-center z-50 p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeAdminModal()"></div>
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm relative border-cyan-500/50 z-20">
            <h2 class="text-xl font-bold mb-4">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Secure Password" 
                   class="w-full bg-slate-950 border border-slate-700 p-3 rounded-xl mb-4 outline-none focus:border-cyan-500 text-white">
            <div class="flex gap-4">
                <button onclick="closeAdminModal()" class="flex-1 p-3 rounded-xl bg-slate-800 font-bold hover:bg-slate-700">Cancel</button>
                <button onclick="verifyPassword()" class="flex-1 p-3 rounded-xl bg-cyan-600 font-bold hover:bg-cyan-500">Unlock</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-6 pb-20 relative z-10">
        <div id="app-gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
            <div class="col-span-full text-center p-20 text-cyan-400 animate-pulse">Loading Nexus...</div>
        </div>
    </main>

    <footer class="text-center p-10 mt-10 border-t border-white/5 relative z-10">
        <p class="shimmer-text font-bold text-xl tracking-wider">Website made by RohanX</p>
    </footer>

    <script>
        const starfield = document.getElementById('starfield');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random()*3 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random()*100 + '%';
            s.style.top = Math.random()*100 + '%';
            s.style.setProperty('--duration', (Math.random()*5+3) + 's');
            starfield.appendChild(s);
        }

        let count = parseInt(localStorage.getItem('visit_count') || '1024');
        count += Math.floor(Math.random() * 5);
        localStorage.setItem('visit_count', count);
        document.getElementById('visitor-count').textContent = count;

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKHORmWOjZcEP7ig4wSP4PVv_JhjTfH-uOATgSjGwf96fAkLt7xXbK4gaNC-RsMLJ6mZpphd3Qc8yY/pub?gid=0&single=true&output=csv';
        const ADMIN_PASSWORD = 'RohanX_Secure_Admin_Access_2026!#';
        const DASHBOARD_LINK = 'https://docs.google.com/spreadsheets/d/1B6m2gQf_iQYt47k4g1V5-VwBw614Hj9wX8sDk1Y0mE8/edit';

        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }

        function verifyPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_PASSWORD) {
                window.open(DASHBOARD_LINK, '_blank');
                closeAdminModal();
                document.getElementById('admin-pass').value = '';
            } else {
                const modal = document.getElementById('admin-modal');
                modal.classList.add('animate-pulse');
                setTimeout(() => modal.classList.remove('animate-pulse'), 500);
            }
        }

        // Robust CSV Parser that handles commas within quotes
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                const result = [];
                let cur = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        result.push(cur.trim());
                        cur = '';
                    } else cur += char;
                }
                result.push(cur.trim());
                return result;
            });
        }

        async function loadApps() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.text();
                const apps = parseCSV(data);
                const container = document.getElementById('app-gallery');
                container.innerHTML = '';

                apps.forEach(([name, desc, icon, link]) => {
                    const card = document.createElement('div');
                    card.className = "glass-card p-6 rounded-3xl border border-white/10";
                    card.innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${icon || 'https://placehold.co/80x80/0f172a/06b6d4?text=App'}" 
                                 class="w-16 h-16 rounded-2xl object-cover bg-slate-800" 
                                 onerror="this.src='https://placehold.co/80x80/0f172a/06b6d4?text=App'">
                            <h2 class="text-xl font-bold">${name || 'Unnamed App'}</h2>
                        </div>
                        <p class="text-slate-400 text-sm mb-6 h-12 overflow-hidden">${desc || 'No description available.'}</p>
                        <a href="${link || '#'}" target="_blank" class="block w-full text-center bg-cyan-600 p-3 rounded-xl font-bold hover:bg-cyan-500 transition-all hover:scale-105 active:scale-95 duration-200">Download</a>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('app-gallery').innerHTML = `<p class="text-red-400 text-center w-full">Nexus temporarily offline. Please check your internet or spreadsheet permissions.</p>`;
            }
        }

        window.onload = loadApps;
    </script>
</body>
</html>
